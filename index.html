<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nosso Álbum ❤️</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow-x: hidden;
}

/* LOGIN */
#login {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.login-box {
    background: white;
    padding: 40px;
    border-radius: 20px;
    text-align: center;
    box-shadow: 0 15px 40px rgba(0,0,0,0.2);
    width: 90%;
    max-width: 400px;
}

.login-box h2 {
    margin-bottom: 20px;
}

.login-box input {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: 1px solid #ccc;
    margin-bottom: 15px;
}

.login-box button {
    width: 100%;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #ff4d6d;
    color: white;
    font-weight: bold;
    cursor: pointer;
}

#erro {
    margin-top: 10px;
    color: red;
}

/* CONTEÚDO */
#conteudo {
    display: none;
}

header {
    text-align: center;
    padding: 60px 20px;
    color: white;
}

header h1 {
    font-size: 2.5rem;
}

#contador {
    margin-top: 15px;
    font-size: 1.2rem;
}

/* MOMENTOS */
.container {
    width: 90%;
    max-width: 1000px;
    margin: auto;
}

.momento {
    background: white;
    margin: 40px 0;
    padding: 25px;
    border-radius: 20px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    transform: translateY(60px);
    opacity: 0;
    transition: 0.6s ease;
}

.momento.ativo {
    transform: translateY(0);
    opacity: 1;
}

.momento h2 {
    margin-bottom: 5px;
}

.momento img {
    width: 100%;
    border-radius: 15px;
}

/* GALERIA */
.galeria {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 15px;
    margin: 15px 0;
}

footer {
    text-align: center;
    padding: 40px;
    color: white;
}

/* RESPONSIVO */
@media(max-width: 600px) {
    header h1 {
        font-size: 2rem;
    }
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
    <div class="login-box">
        <h2>Digite sua senha, dica : Seu aniversário</h2>
        <input type="password" id="senha" placeholder="Senha">
        <button onclick="verificarSenha()">Entrar</button>
        <p id="erro"></p>
    </div>
</div>

<!-- CONTEÚDO -->
<div id="conteudo">

<header>
    <h1>Nosso Álbum ❤️</h1>
    <p id="contador"></p>
</header>

<div class="container" id="linhaDoTempo"></div>

<footer>
    26/02/2026 💕
</footer>

</div>

<script>
// ================= CONFIGURAÇÕES =================
const DATA_INICIO = "2023-06-12"; // ALTERE SE QUISER
const SENHA_CORRETA = "2710"; // ALTERE AQUI

// ================= MOMENTOS =================
const momentos = [
{
    data: "26/02/2026",
    titulo: "26 de Fevereiro de 2026 ❤️",
    mensagem: "Um dia simples, um dia cansativo do trabalho, da rotina do dia, mas cheio de amor.E lá estávamos nós, nos vendo pela primeira vez. Cada abraço, cada sorriso e cada momento ao seu lado faz tudo valer a pena. Te amo infinitamente 💕",
    imagens: [
        "ela1.jpeg",
        "ela2.jpeg",
        "ela3.jpeg"
    ]
}
];

// ================= LOGIN =================
function verificarSenha() {
    const senha = document.getElementById("senha").value;

    if (senha === SENHA_CORRETA) {
        document.getElementById("login").style.display = "none";
        document.getElementById("conteudo").style.display = "block";
        iniciarSite();
    } else {
        document.getElementById("erro").innerText = "Senha incorreta 💔";
    }
}

// ================= INICIAR =================
function iniciarSite() {
    gerarMomentos();
    atualizarContador();
    animacaoScroll();
}

// ================= GERAR MOMENTOS =================
function gerarMomentos() {
    const container = document.getElementById("linhaDoTempo");

    momentos.forEach(m => {

        let galeriaHTML = `<div class="galeria">`;

        m.imagens.forEach(img => {
            galeriaHTML += `<img src="${img}">`;
        });

        galeriaHTML += `</div>`;

        container.innerHTML += `
        <div class="momento">
            <h2>${m.titulo}</h2>
            <p><strong>${m.data}</strong></p>
            ${galeriaHTML}
            <p>${m.mensagem}</p>
        </div>
        `;
    });
}

// ================= CONTADOR =================
function atualizarContador() {
    const inicio = new Date(DATA_INICIO);
    const hoje = new Date();
    const diff = Math.floor((hoje - inicio) / (1000 * 60 * 60 * 24));

    document.getElementById("contador").innerText =
        `Estamos juntos há ${diff} dias ❤️`;
}

// ================= ANIMAÇÃO =================
function animacaoScroll() {
    const elementos = document.querySelectorAll(".momento");

    function mostrar() {
        elementos.forEach(el => {
            const posicao = el.getBoundingClientRect().top;
            const alturaTela = window.innerHeight;

            if (posicao < alturaTela - 100) {
                el.classList.add("ativo");
            }
        });
    }

    window.addEventListener("scroll", mostrar);
    mostrar();
}
</script>

</body>
</html>
